# 1) Get published checkout profile id
query checkoutProfiles {
  checkoutProfiles(first: 1, query: "is_published:true") {
    edges {
      node {
        id
        name
      }
    }
  }
}

# 2) Apply QPlXwaEk with weight 700 and map headings to SECONDARY
mutation SetCheckoutBranding($profileId: ID!) {
  checkoutBrandingUpsert(
    checkoutProfileId: $profileId
    checkoutBrandingInput: {
      designSystem: {
        typography: {
          secondary: {
            base: {
              sources: "local('QPlXwaEk'), sans-serif"
              weight: 700
            }
          }
        }
      }
      customizations: {
        headingLevel1: {
          typography: {
            font: SECONDARY
            weight: BOLD
          }
          color: "#000000"
        }
      }
    }
  ) {
    checkoutBranding {
      designSystem {
        typography {
          secondary {
            base {
              sources
              weight
            }
          }
        }
      }
      customizations {
        headingLevel1 {
          typography {
            font
            weight
          }
          color
        }
      }
    }
    userErrors {
      field
      message
    }
  }
}

# Variables for mutation:
# {
#   "profileId": "gid://shopify/CheckoutProfile/1"
# }
mutation SetCheckoutBranding($profileId: ID!, $fontFileId: ID!) {
  checkoutBrandingUpsert(
    checkoutProfileId: $profileId
    checkoutBrandingInput: {
      designSystem: {
        typography: {
          secondary: {
            customFontGroup: {
              base: {
                genericFileId: $fontFileId
                weight: 700
              }
              bold: {
                genericFileId: $fontFileId
                weight: 700
              }
            }
          }
        }
      }
      customizations: {
        headingLevel1: {
          typography: {
            font: SECONDARY
            weight: BOLD
          }
        }
      }
    }
  ) {
    userErrors {
      field
      message
    }
  }
}


